          char command[40];
          snprintf(command, sizeof(command), "SETPARAM,11,%.0f,END#", x);
          id(ecopv_uart).write_str(command);
          id(ecopv_uart).write_str("PARAM,END#");

  - platform: template
    name: "T DIV2 ON (Min relay on time)"
    id: t_div2_on
    unit_of_measurement: "min"
    icon: mdi:timer-play
    min_value: 0
    max_value: 240
    step: 1
    optimistic: false
    restore_value: false
    set_action:
      - lambda: |-
          char command[40];
          snprintf(command, sizeof(command), "SETPARAM,12,%.0f,END#", x);
          id(ecopv_uart).write_str(command);
          id(ecopv_uart).write_str("PARAM,END#");

  - platform: template
    name: "T DIV2 OFF (Min relay off time)"
    id: t_div2_off
    unit_of_measurement: "min"
    icon: mdi:timer-stop
    min_value: 0
    max_value: 240
    step: 1
    optimistic: false
    restore_value: false
    set_action:
      - lambda: |-
          char command[40];
          snprintf(command, sizeof(command), "SETPARAM,13,%.0f,END#", x);
          id(ecopv_uart).write_str(command);
          id(ecopv_uart).write_str("PARAM,END#");

  - platform: template
    name: "T DIV2 TC (Averaging time constant)"
    id: t_div2_tc
    unit_of_measurement: "min"
    icon: mdi:chart-bell-curve
    min_value: 0
    max_value: 60
    step: 1
    optimistic: false
    restore_value: false
    set_action:
      - lambda: |-
          char command[40];
          snprintf(command, sizeof(command), "SETPARAM,14,%.0f,END#", x);
          id(ecopv_uart).write_str(command);
          id(ecopv_uart).write_str("PARAM,END#");

  # --- Pulse counter & PV installation ---
  - platform: template
    name: "Counter Calibration"
    id: counter_calibration
    unit_of_measurement: "Wh/pulse"
    icon: mdi:pulse
    min_value: 1
    max_value: 1000
    step: 1
    optimistic: false
    restore_value: false
    set_action:
      - lambda: |-
          char command[40];
          snprintf(command, sizeof(command), "SETPARAM,15,%.1f,END#", x);
          id(ecopv_uart).write_str(command);
          id(ecopv_uart).write_str("PARAM,END#");

  - platform: template
    name: "PV Installation Power"
    id: pv_installation_power
    unit_of_measurement: "Wc"
    icon: mdi:solar-panel
    min_value: 100
    max_value: 30000
    step: 100
    optimistic: false
    restore_value: false
    set_action:
      - lambda: |-
          char command[40];
          snprintf(command, sizeof(command), "SETPARAM,16,%.0f,END#", x);
          id(ecopv_uart).write_str(command);
          id(ecopv_uart).write_str("PARAM,END#");

  # --- Boost & local controls (ESP-side only, not EcoPV params) ---
  - platform: template
    name: "Boost Duration"
    id: boost_duration
    unit_of_measurement: "min"
    icon: mdi:timer
    min_value: 10
    max_value: 480
    step: 10
    optimistic: true
    restore_value: true

  - platform: template
    name: "Max Water Temperature"
